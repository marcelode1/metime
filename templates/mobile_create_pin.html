{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:auto;">
    <h2>Create Mobile PIN</h2>
    <p class="muted">{{ user.email }}</p>
    <form method="post">
        <label>4-digit PIN</label>
        <input name="pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" minlength="4" autocomplete="new-password" required>
        <label>Confirm PIN</label>
        <input name="confirm_pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" minlength="4" autocomplete="new-password" required>
        <label class="stayLoginCheck">
            <input name="stay_logged_in" type="checkbox" {% if stay_logged_in %}checked{% endif %}>
            Stay logged in on this phone
        </label>
        <button type="submit">Save PIN</button>
    </form>
</div>
<style>
.stayLoginCheck{display:flex;align-items:center;gap:10px;margin:10px 0 14px;font-weight:800}
.stayLoginCheck input{width:auto;min-height:auto;margin:0}
</style>
{% endblock %}
