<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MeTime">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}">
    <style>
        :root{--bg:#f6f2fb;--card:#fff;--text:#2a2140;--muted:#7c708f;--brand:#7c3aed;--brand-dark:#6d28d9;
              --accent:#c9a24a;--magenta:#b01e68;--danger:#dc2626;--border:#e7defa;--radius:18px}
        *{box-sizing:border-box}
        body{margin:0;font-family:-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);
             padding-bottom:env(safe-area-inset-bottom);line-height:1.5}
        header{background:linear-gradient(135deg,#b9a3dd,#7c3aed);color:#fff;padding:16px 18px;border-bottom:3px solid var(--accent);
               display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
        header .brand{font-weight:900;font-size:20px;letter-spacing:.3px;text-decoration:none;color:#fff;display:flex;align-items:center;gap:10px}
        header .brand img{width:30px;height:30px;border-radius:8px}
        header nav{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
        header nav a{color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:8px 11px;border-radius:10px}
        header nav a:hover{background:rgba(255,255,255,.16)}
        main{max-width:760px;margin:0 auto;padding:18px 16px 40px}
        .card{background:var(--card);border-radius:var(--radius);padding:20px;margin:0 0 16px;
              box-shadow:0 6px 22px rgba(15,118,110,.08)}
        h1{font-size:26px;margin:0 0 12px}h2{font-size:22px;margin:0 0 12px}h3{font-size:18px;margin:0 0 10px}
        p{margin:8px 0}.muted{color:var(--muted)}
        label{display:block;font-weight:700;font-size:14px;color:#334155;margin:14px 0 6px}
        input,textarea,select{width:100%;padding:13px;border:1px solid var(--border);border-radius:12px;
              font-size:16px;background:#fff;color:var(--text)}
        textarea{min-height:90px;resize:vertical}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:560px){.row2{grid-template-columns:1fr}}
        .checkbox{display:flex;gap:10px;align-items:flex-start;margin:12px 0}
        .checkbox input{width:auto;margin-top:3px}
        button,.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:14px;
              background:var(--brand);color:#fff;font-weight:800;font-size:16px;padding:14px 20px;cursor:pointer;
              text-decoration:none;margin-top:14px}
        button:hover,.btn:hover{background:var(--brand-dark)}
        .btn-ghost{background:#f1e8ff;color:var(--brand-dark)}
        .btn-block{width:100%}
        .flash{background:#f3e9ff;border:1px solid #e2cffb;color:#5b21b6;border-radius:12px;padding:12px 14px;margin:0 0 14px;font-weight:600}
        .pill{display:inline-block;background:#f1e8ff;color:var(--brand-dark);font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px}
        table{width:100%;border-collapse:collapse}
        a{color:var(--brand-dark)}
    </style>
</head>
<body>
    <header>
        <a class="brand" href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='icon-192.png') }}" alt="">{{ app_name }}
        </a>
        <nav>
            {% if session_role == 'admin' %}
                <a href="{{ url_for('admin_dashboard') }}">Clients</a>
                <a href="{{ url_for('logout') }}">Log out</a>
            {% elif session_role == 'client' %}
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('intake') }}">My Form</a>
                <a href="{{ url_for('logout') }}">Log out</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% with messages = get_flashed_messages() %}
            {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script>
        if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js",{scope:"/"}).catch(()=>{})}
    </script>
</body>
</html>
