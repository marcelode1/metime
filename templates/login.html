{% extends "base.html" %}
{% block title %}Log In - {{ app_name }}{% endblock %}
{% block content %}
<div class="card">
    <h1>Log In</h1>
    <form method="post">
        <label>Email</label>
        <input name="email" type="email" value="{{ email or '' }}" required>
        <label>Password</label>
        <input name="password" type="password" autocomplete="current-password" required>
        <button class="btn-block" type="submit">Log In</button>
    </form>
    <p class="muted" style="margin-top:14px">New here? <a href="{{ url_for('signup') }}">Become a client</a></p>
</div>
{% endblock %}
