{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px;margin:auto;">
    <h2>Forgot Admin Password</h2>
    <form method="post">
        <label>Admin Email or Username</label>
        <input name="email" required>
        <button type="submit">Send Reset Email</button>
    </form>
    {% if reset_link %}
        <div class="card">
            <p>Email is not configured, so use this reset link:</p>
            <a class="btn-link" href="{{ reset_link }}">Create New Password</a>
        </div>
    {% endif %}
    <a class="btn-link btn-secondary" href="{{ url_for('login') }}">Back to Login</a>
</div>
{% endblock %}
