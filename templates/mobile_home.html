{% extends "base.html" %}
{% block content %}
<div class="card mobileHomeMenu">
    <h1>ProjectONus Mobile</h1>
    {% if is_main_admin() %}
        <a class="btn-link" href="{{ url_for('mobile_projects') }}">Projects</a>
        <a class="btn-link btn-secondary" href="{{ url_for('mobile_project_search') }}">Search Projects</a>
        <a class="btn-link" href="{{ url_for('create_global_task') }}">Create a Task</a>
        <a class="btn-link" href="{{ url_for('today_tasks') }}">Today's Tasks</a>
        <a class="btn-link btn-secondary" href="{{ url_for('my_tasks', mode='search') }}">Search Task</a>
        <a class="btn-link" href="{{ url_for('my_time_report') }}">Time Report</a>
        <a class="btn-link" href="{{ url_for('mobile_inventory') }}">Inventory</a>
    {% else %}
        <a class="btn-link" href="{{ url_for('mobile_projects') }}">Projects</a>
        <a class="btn-link btn-secondary" href="{{ url_for('mobile_project_search') }}">Search Projects</a>
        <a class="btn-link" href="{{ url_for('today_tasks') }}">Today's Tasks</a>
        <a class="btn-link btn-secondary" href="{{ url_for('my_tasks', mode='search') }}">Search Task</a>
        <a class="btn-link" href="{{ url_for('my_time_report') }}">Time Report</a>
        <a class="btn-link" href="{{ url_for('mobile_inventory') }}">Inventory</a>
    {% endif %}
</div>
<style>
.mobileHomeMenu{display:grid;gap:10px}
.mobileHomeMenu .btn-link{margin:0}
</style>
{% endblock %}
