{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:auto;">
    <h2>Mobile User Login</h2>
    <form method="post">
        <label>Email</label>
        <input name="email" type="email" value="{{ email or '' }}" required>
        <label>PIN</label>
        <input name="pin" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{4}" maxlength="4" minlength="4" required>
        <label class="stayLoginCheck">
            <input name="stay_logged_in" type="checkbox" {% if stay_logged_in %}checked{% endif %}>
            Stay logged in on this phone
        </label>
        <button type="submit">Open Mobile Version</button>
    </form>
    <a class="btn-link btn-secondary" href="{{ url_for('mobile_forgot_pin') }}">Forgot PIN?</a>
    <a class="btn-link btn-secondary" href="{{ url_for('login') }}">Admin Login</a>
</div>
<style>
.stayLoginCheck{display:flex;align-items:center;gap:10px;margin:10px 0 14px;font-weight:800}
.stayLoginCheck input{width:auto;min-height:auto;margin:0}
</style>
{% endblock %}
