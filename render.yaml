services:
  - type: web
    name: metime
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_NAME
        value: MeTime
      - key: DATABASE_URL
        sync: false
