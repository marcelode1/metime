services:
  - type: web
    name: blueprint-room-log-v2
    runtime: python
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install --no-cache-dir --only-binary=:all: -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: blueprint-files
